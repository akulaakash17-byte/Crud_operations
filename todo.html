<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <style>
    * {
        box-sizing: border-box;
        font-family: 'Courier New', Courier, monospace;
    }

    body {
        background: #0f0f0f;
        color: #00ff00;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: #1a1a1a;
        padding: 25px;
        width: 400px;
        border-radius: 8px;
        border: 2px solid #00ff00;
        box-shadow: 0 0 20px #00ff00 inset, 0 0 30px #00ff00;
    }

    #todo {
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.5em;
        color: #00ff00;
        text-shadow: 0 0 5px #00ff00;
    }

    .controls {
        display: flex;
        gap: 8px;
    }

    input {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 4px;
        outline: none;
        background: #0f0f0f;
        color: #00ff00;
        border: 1px solid #00ff00;
    }

    input::placeholder {
        color: #00ff00;
        opacity: 0.6;
    }

    button {
        padding: 10px 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        background: #0f0f0f;
        color: #00ff00;
        border: 1px solid #00ff00;
        transition: 0.2s;
    }

    button:hover {
        background: #00ff00;
        color: #0f0f0f;
        box-shadow: 0 0 10px #00ff00;
    }

    #todoList {
        margin-top: 20px;
        background: #0f0f0f;
        padding: 15px;
        border-radius: 6px;
        border: 1px solid #00ff00;
        min-height: 80px;
    }

    .task {
        padding: 6px 10px;
        border-bottom: 1px solid #004d00;
        display: block;
        white-space: nowrap; /* Keep everything on one line */
    }

    .task:last-child {
        border-bottom: none;
    }

    /* Style for the buttons inline with task */
    .task button {
        background: #0f0f0f;
        color: #ff0000;
        border: 1px solid #ff0000;
        padding: 3px 6px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 0.85em;
        margin-left: 10px; /* space between buttons and text */
        display: inline-block;
        vertical-align: middle;
        transition: 0.2s;
    }

    .task button:hover {
        background: #ff0000;
        color: #0f0f0f;
        box-shadow: 0 0 5px #ff0000;
    }
</style>


</head>
<body>

<div class="container">
    <h2 id="todo">My Todo List</h2>

    <div class="controls">
        <input type="text" id="todoInput" placeholder="Enter a task">
        <button id="addBtn"></button>
        <button id="clearBtn">clear</button>
    </div>

    <div id="todoList"></div>
</div>

<script>
    // array of objects
    let todoList = [
        { id: 1, task: "Buy groceries" },
        { id: 2, task: "Walk the dog" },
        { id: 3, task: "Read a book" }
    ];

    const todoListElement = document.getElementById("todoList");
    const todoInput = document.getElementById("todoInput");
    const addBtn = document.getElementById("addBtn");
    const clearBtn = document.getElementById("clearBtn");

    addBtn.onclick = function () {
        let tasks = todoInput.value;
        if (tasks === "") return;

        todoList.push({
            id: todoList.length + 1,
            task: tasks
        });
        let content = document.getElementById("addBtn");
        content.value = "Add";
        showTasks();    
    }

    
    function showTasks() {
        let content = '';
        for (let i = 0; i < todoList.length; i++) {
            content += `<div 
                            class="task" onclick="markAsDone(${todoList[i].id})" style="cursor: pointer;">${todoList[i].id}. ${todoList[i].task}
                        </div>
                        <span>
                            <button onclick="deleteTask(${todoList[i].id})">Delete</button>
                        </span>
                        <span>
                            <button onclick="editTask(${todoList[i].id})">Edit</button>
                        </span>`;
        }
        todoInput.value = "";
        todoListElement.innerHTML = content;
        
    }

    
    editTask = function (id) {
        if (id) {
             let taskToEdit = todoList.find(function(task) {
                 return task.id === id;
             }); 
            if (taskToEdit) {
                let newTask = prompt("Edit task:", taskToEdit.task);
                if (newTask !== null && newTask!== "") {
                    taskToEdit.task = newTask;
                }else{
                    alert("Task cannot be empty.");
                }
                
            }
        }
        showTasks();
    }
    
    
    deleteTask = function (id) {
        todoList = todoList.filter(function(task) {
            return task.id !== id;
        });
        showTasks();
    }

    showTasks();

    clearBtn.onclick = function () {
        todoList = [];
        showTasks();
    }   
    
    markAsDone = function (id) {
        for (let i = 0; i < todoList.length; i++) {
            if (todoList[i].id === id) {
                todoList[i].task = `<s>${todoList[i].task}</s>`;
                break;
            }
            
        }
        showTasks();
    }

</script>

</body>
</html>
