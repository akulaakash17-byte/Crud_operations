<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="flex flex-col justify-center items-center mt-[300px]">
        <div class="flex flex-col gap-[20px]">
            <form class="flex flex-col gap-3" onsubmit="verification(event)">
                <div>
                    <label>Name : </label>
                    <input type="text" id="name" placeholder="enter your name">
                    <p id="reqName"></p>
                </div>
                <div>
                    <label>Email : </label>
                    <input type="email" id="email" placeholder="enter your emailId">
                    <p id="reqEmail"></p>
                </div>
                <div>
                    <label>Password : </label>
                    <input type="password" id="password" placeholder="enter your password">
                    <p id="reqPassword"></p>
                </div>
                <button type="submit" id="submit">Signup</button>
            </form>
        </div>
        <div>
            <p id="loginSuccessfull"></p>
            <p>if account already exists <span><button class="text-blue-600 bg-" onclick="loginVerification()">Login</button></span></p>
        </div>
    </div>

    <script>
        let UsersList = [
            { id: 1, name: "Akash", email: "akulaakash17@gmail.com", password: "akash123" },
            { id: 2, name: "shiva", email: "shiva@gmail.com", password: "shiva123" },
            { id: 3, name: "saathvik", email: "saathvik@gmail.com", password: "saathvik123" }

        ];

        function verification(event) {
            event.preventDefault();
            let userName = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            if (userName === "") {
                document.getElementById("reqName").innerHTML = "Please fill this field";

            }
            if (email === "") {
                document.getElementById("reqEmail").innerHTML = "Please fill this field";

            }
            if (password === "") {
                document.getElementById("reqPassword").innerHTML = "Please fill this field";

            }
            if (userName === "" || email === "" || password === "") {
                return;
            }


            for (let i = 0; i < UsersList.length; i++) {


                if (UsersList[i].email === email) {
                    document.getElementById("reqEmail").innerHTML = "email already exists";
                    return;
                }
                if (UsersList[i].name === userName) {
                    document.getElementById("reqName").innerHTML = "username already exists";
                    return;
                }
            }

            document.getElementById("reqEmail").innerHTML = "";
            document.getElementById("reqName").innerHTML = "";
            document.getElementById("reqPassword").innerHTML = "";

            UsersList.push({ id: UsersList.length + 1, name: userName, email: email, password: password });
            console.log(UsersList);

            document.getElementById("loginSuccessfull").innerHTML = "Sign up Successful";
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";

        }


        function loginVerification() {

            let userName = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            document.getElementById("reqEmail").innerHTML = "";
            document.getElementById("reqName").innerHTML = "";
            document.getElementById("reqPassword").innerHTML = "";

            if (userName === "") {
                document.getElementById("reqName").innerHTML = "Please fill this field";

            }
            if (email === "") {
                document.getElementById("reqEmail").innerHTML = "Please fill this field";

            }
            if (password === "") {
                document.getElementById("reqPassword").innerHTML = "Please fill this field";

            }
            if (userName === "" || email === "" || password === "") {
                return;
            }


            for (let i = 0; i < UsersList.length; i++) {
                if (UsersList[i].name === userName && UsersList[i].email === email && UsersList[i].password === password) {
                    console.log("login Successfull")
                    document.getElementById("loginSuccessfull").innerHTML = "Login Successfull";
                    return;
                } else {
                    console.log("invalid credentials")
                    document.getElementById("loginSuccessfull").innerHTML = "Invalid Credentials";
                }
            }
        }

    </script>
</body>

</html>
